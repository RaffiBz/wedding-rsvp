<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Raffi & Nver — You're Invited</title>

    <!--
      Open Graph / link-preview tags — IDENTICAL to index.html. Pages serves
      this 404.html for deep links (/rsvp?t=…), and WhatsApp's crawler (no JS)
      may hit it directly, so the preview must render from this file too.
      PRODUCTION_URL = https://raffibz.github.io/wedding-rsvp
    -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Raffi & Nver — Save the Date" />
    <meta property="og:description" content="Saturday 01.08.26 · Yerevan. We'd love to celebrate with you — RSVP here." />
    <meta property="og:image" content="https://raffibz.github.io/wedding-rsvp/og-image.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:url" content="https://raffibz.github.io/wedding-rsvp/" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Raffi & Nver — Save the Date" />
    <meta name="twitter:description" content="Saturday 01.08.26 · Yerevan. RSVP here." />
    <meta name="twitter:image" content="https://raffibz.github.io/wedding-rsvp/og-image.jpg" />

    <!--
      GitHub Pages SPA fallback. GitHub serves this file for any unknown path
      (e.g. /rsvp?t=abc on a hard load). We encode the path into the query string
      and redirect to the app root, where index.html restores the real URL.
      pathSegmentsToKeep = 1 because the app is served from a project subpath
      (https://<user>.github.io/<repo>/). Set to 0 for a user/org root site.
      Source: https://github.com/rafgraph/spa-github-pages
    -->
    <script>
      (function () {
        var pathSegmentsToKeep = 1;
        var l = window.location;
        l.replace(
          l.protocol +
            '//' +
            l.hostname +
            (l.port ? ':' + l.port : '') +
            l.pathname
              .split('/')
              .slice(0, 1 + pathSegmentsToKeep)
              .join('/') +
            '/?/' +
            l.pathname
              .slice(1)
              .split('/')
              .slice(pathSegmentsToKeep)
              .join('/')
              .replace(/&/g, '~and~') +
            (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
            l.hash
        );
      })();
    </script>
  </head>
  <body></body>
</html>
