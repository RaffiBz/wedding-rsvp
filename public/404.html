<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Raffi & Nver — You're Invited</title>
    <!--
      GitHub Pages SPA fallback. GitHub serves this file for any unknown path
      (e.g. /rsvp?t=abc on a hard load). We encode the path into the query string
      and redirect to the app root, where index.html restores the real URL.
      pathSegmentsToKeep = 1 because the app is served from a project subpath
      (https://<user>.github.io/<repo>/). Set to 0 for a user/org root site.
      Source: https://github.com/rafgraph/spa-github-pages
    -->
    <script>
      (function () {
        var pathSegmentsToKeep = 1;
        var l = window.location;
        l.replace(
          l.protocol +
            '//' +
            l.hostname +
            (l.port ? ':' + l.port : '') +
            l.pathname
              .split('/')
              .slice(0, 1 + pathSegmentsToKeep)
              .join('/') +
            '/?/' +
            l.pathname
              .slice(1)
              .split('/')
              .slice(pathSegmentsToKeep)
              .join('/')
              .replace(/&/g, '~and~') +
            (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
            l.hash
        );
      })();
    </script>
  </head>
  <body></body>
</html>
