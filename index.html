<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#2f4a32" />
    <title>Raffi & Nver — You're Invited</title>
    <meta name="description" content="Join us to celebrate the union of Raffi & Nver." />
    <!--
      GitHub Pages SPA redirect restore.
      404.html encodes the deep-link path into the query string and redirects here;
      this script decodes it back into a clean URL before React Router boots.
      Source: https://github.com/rafgraph/spa-github-pages
    -->
    <script>
      (function () {
        var l = window.location;
        if (l.search[1] === '/') {
          var decoded = l.search
            .slice(1)
            .split('&')
            .map(function (s) {
              return s.replace(/~and~/g, '&');
            })
            .join('?');
          window.history.replaceState(
            null,
            null,
            l.pathname.slice(0, -1) + decoded + l.hash
          );
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
