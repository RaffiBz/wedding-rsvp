      Open Graph / link-preview tags. STATIC ONLY — WhatsApp's crawler does not

      public/404.html mirrors these tags verbatim AND bridges already-shared
      non-hash links (/rsvp?t=…) into the hash route. Keep the blocks identical.
    -->
